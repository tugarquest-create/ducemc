<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DuceMC.PL | Elite Minecraft Network</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff9800; /* Złoty ze screena */
            --blue: #1e90ff;    /* Błękit nieba */
            --green: #00ff88;   /* Zieleń budowli */
            --bg-dark: #050508;
            --card-bg: rgba(10, 10, 15, 0.95);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: default; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-dark);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            perspective: 1500px;
        }

        /* TŁO */
        #bg-image {
            position: fixed;
            inset: -5%;
            width: 110%; height: 110%;
            background-image: url('logo.png');
            background-size: cover;
            background-position: center;
            z-index: -2;
            filter: brightness(0.4) blur(3px);
        }

        /* GŁÓWNA KARTA */
        .main-container {
            position: relative;
            background: var(--card-bg);
            border-radius: 40px;
            padding: 50px;
            width: 95%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 1.2fr 1.8fr;
            gap: 40px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
            overflow: hidden;
            transform-style: preserve-3d;
            will-change: transform;
        }

        /* EFEKT WĘŻA (SNAKE BORDER) */
        .snake { position: absolute; display: block; filter: blur(2px); }
        .s1 { top: 0; left: -100%; width: 100%; height: 4px; background: linear-gradient(90deg, transparent, var(--primary)); animation: s1 4s linear infinite; }
        .s2 { top: -100%; right: 0; width: 4px; height: 100%; background: linear-gradient(180deg, transparent, var(--primary)); animation: s2 4s linear infinite; animation-delay: 2s; }
        .s3 { bottom: 0; right: -100%; width: 100%; height: 4px; background: linear-gradient(270deg, transparent, var(--primary)); animation: s3 4s linear infinite; }
        .s4 { bottom: -100%; left: 0; width: 4px; height: 100%; background: linear-gradient(360deg, transparent, var(--primary)); animation: s4 4s linear infinite; animation-delay: 2s; }

        @keyframes s1 { 0% { left: -100%; } 50%, 100% { left: 100%; } }
        @keyframes s2 { 0% { top: -100%; } 50%, 100% { top: 100%; } }
        @keyframes s3 { 0% { right: -100%; } 50%, 100% { right: 100%; } }
        @keyframes s4 { 0% { bottom: -100%; } 50%, 100% { bottom: 100%; } }

        /* LEWA STRONA (INFO) */
        .left { text-align: center; border-right: 1px solid rgba(255,255,255,0.05); padding-right: 20px; }
        .logo { width: 180px; filter: drop-shadow(0 0 20px var(--primary)); margin-bottom: 20px; }
        h1 { font-size: 3.5rem; font-weight: 900; background: linear-gradient(#fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .ip-box {
            margin-top: 30px;
            background: var(--primary);
            color: black;
            padding: 15px;
            border-radius: 15px;
            font-weight: 900;
            cursor: pointer;
            transition: 0.3s;
        }
        .ip-box:hover { transform: scale(1.05); box-shadow: 0 0 30px var(--primary); }

        /* PRAWA STRONA (MENU) */
        .right { display: flex; flex-direction: column; gap: 20px; }
        .section-title { font-size: 0.7rem; letter-spacing: 3px; color: #555; font-weight: 900; text-transform: uppercase; }

        .nav-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px;
            text-decoration: none;
            color: white;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .nav-item:hover { transform: translateX(15px); background: rgba(255,255,255,0.07); }
        .nav-item i { font-size: 2rem; }
        .nav-item div b { display: block; font-size: 1.1rem; }
        .nav-item div span { font-size: 0.75rem; opacity: 0.5; }

        /* Kolory przycisków */
        .n-shop:hover { border-color: var(--primary); }
        .n-rec:hover { border-color: var(--green); }
        .n-rules:hover { border-color: var(--blue); }

        /* NOTYFIKACJA */
        #notif {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: var(--primary); color: #000; padding: 15px 40px;
            border-radius: 50px; font-weight: 900; transition: 0.5s ease; z-index: 1000;
        }
        #notif.active { top: 30px; }

        @media (max-width: 900px) {
            .main-container { grid-template-columns: 1fr; }
            .left { border: none; padding-right: 0; }
        }
    </style>
</head>
<body>

    <div id="bg-image"></div>

    <div class="main-container" id="card">
        <span class="snake s1"></span><span class="snake s2"></span>
        <span class="snake s3"></span><span class="snake s4"></span>

        <div class="left">
            <img src="logo.png" alt="DUCEMC" class="logo">
            <h1>DUCEMC.PL</h1>
            <p style="opacity: 0.6; margin-top: 10px;">INNOWACYJNA SIEĆ SERWERÓW</p>
            
            <div class="ip-box" onclick="copyIP()">
                KLIKNIJ, ABY SKOPIOWAĆ IP
            </div>

            <div style="margin-top: 40px; text-align: left;">
                <p class="section-title">ADMINISTRACJA</p>
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <img src="https://cravatar.eu/avatar/RdstoneBrilliant/32.png" style="border-radius: 5px;">
                    <img src="https://cravatar.eu/avatar/TugareK/32.png" style="border-radius: 5px;">
                    <img src="https://cravatar.eu/avatar/xGwiazdek15/32.png" style="border-radius: 5px;">
                </div>
            </div>
        </div>

        <div class="right">
            <p class="section-title">NAWIGACJA</p>
            <div class="nav-grid">
                <a href="sklep.html" class="nav-item n-shop">
                    <i>🛒</i>
                    <div>
                        <b style="color: var(--primary);">ITEMSHOP</b>
                        <span>Kup rangi, klucze i dodatki</span>
                    </div>
                </a>
                <a href="rekrutacja.html" class="nav-item n-rec">
                    <i>📝</i>
                    <div>
                        <b style="color: var(--green);">REKRUTACJA</b>
                        <span>Dołącz do ekipy serwera</span>
                    </div>
                </a>
                <a href="regulamin.html" class="nav-item n-rules">
                    <i>📜</i>
                    <div>
                        <b style="color: var(--blue);">REGULAMIN</b>
                        <span>Zasady panujące w sieci</span>
                    </div>
                </a>
            </div>

            <p class="section-title" style="margin-top: 20px;">SOCIAL MEDIA</p>
            <a href="https://dc.ducemc.pl" target="_blank" class="nav-item" style="background: #5865F2;">
                <i>💬</i>
                <div>
                    <b>DISCORD</b>
                    <span>Dołącz do naszej społeczności</span>
                </div>
            </a>
        </div>
    </div>

    <div id="notif">SKOPIOWANO ADRES IP!</div>

    <script>
        const card = document.getElementById('card');
        let mX = 0, mY = 0, cX = 0, cY = 0;

        window.addEventListener('mousemove', (e) => {
            mX = (window.innerWidth / 2 - e.pageX) / 70;
            mY = (window.innerHeight / 2 - e.pageY) / 70;
        });

        function animate() {
            cX += (mX - cX) * 0.05;
            cY += (mY - cY) * 0.05;
            card.style.transform = `rotateY(${-cX}deg) rotateX(${cY}deg)`;
            requestAnimationFrame(animate);
        }
        animate();

        function copyIP() {
            navigator.clipboard.writeText("DUCEMC.PL");
            const n = document.getElementById('notif');
            n.classList.add('active');
            setTimeout(() => n.classList.remove('active'), 2500);
        }
    </script>
</body>
</html>

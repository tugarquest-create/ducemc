<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DuceMC.PL | The Next Era</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #ff0055; /* Hot Pink/Crimson */
            --secondary: #7000ff; /* Electric Purple */
            --bg-start: #0a0510;
            --bg-end: #030105;
            --text-glow: 0 0 20px rgba(255, 0, 85, 0.6);
            --glass: rgba(10, 5, 20, 0.8);
            --border: rgba(255, 255, 255, 0.08);
            --transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg-start);
            color: white;
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* Wyłączamy scroll, bo tło pływa */
            perspective: 1500px;
        }

        /* --- DYNAMICZNE TŁO OBRAZOWE --- */
        #bg-image {
            position: fixed;
            top: -10%; left: -10%; /* Zapas na ruch parallax */
            width: 120%; height: 120%;
            background-image: url('obraz1.png'); /* <--- TWOJE ZDJĘCIE */
            background-size: cover;
            background-position: center;
            z-index: -2;
            filter: brightness(0.4) contrast(1.1) blur(2px); /* Przyciemniamy i lekko rozmywamy tło */
            transition: transform 0.1s ease-out; /* Płynny ruch */
        }

        /* --- NAKŁADKA GRADIENTOWA DLA GŁĘBI --- */
        #bg-overlay {
            position: fixed; inset: 0;
            background: radial-gradient(circle at center, transparent 0%, var(--bg-end) 100%);
            z-index: -1;
            opacity: 0.8;
        }

        /* --- GŁÓWNY PANELE --- */
        .master-panel {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 60px;
            width: 90%;
            max-width: 1000px;
            text-align: center;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9), inset 0 0 30px rgba(112, 0, 255, 0.05);
            transform-style: preserve-3d;
            animation: panelEntrance 1.5s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        @keyframes panelEntrance {
            from { opacity: 0; transform: scale(0.9) translateY(50px) rotateX(10deg); }
            to { opacity: 1; transform: scale(1) translateY(0) rotateX(0); }
        }

        /* --- LOGO I TYTUŁ Z EFEKTEM GLITCH --- */
        .logo-box { position: relative; display: inline-block; margin-bottom: 20px; transform: translateZ(30px); }
        .logo-img { width: 140px; animation: hoverAni 4s ease-in-out infinite; z-index: 5; position: relative; filter: drop-shadow(0 0 20px var(--accent)); }
        
        @keyframes hoverAni { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-15px) rotate(2deg); } }

        .glitch-title {
            font-family: 'Syncopate', sans-serif;
            font-size: 5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: -6px;
            position: relative;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
            transform: translateZ(50px);
        }
        
        /* Efekt podwojenia glitch */
        .glitch-title::before, .glitch-title::after {
            content: 'DUCEMC';
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: transparent; -webkit-background-clip: text;
            opacity: 0.1; z-index: -1;
        }
        .glitch-title::before { color: var(--accent); transform: translate(-3px, 0); animation: glitch 2s infinite; }
        .glitch-title::after { color: var(--secondary); transform: translate(3px, 0); animation: glitch 2s infinite reverse; }

        @keyframes glitch { 
            0%, 100% { transform: translate(-3px, 0); } 
            50% { transform: translate(3px, -2px); } 
        }

        /* --- KONTENER PRZYCISKÓW --- */
        .action-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 40px;
            transform: translateZ(20px);
        }

        .cyber-btn {
            position: relative;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: 20px;
            text-decoration: none;
            color: #fff;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .cyber-btn i { font-size: 1.8rem; margin-bottom: 5px; opacity: 0.5; transition: 0.4s; }

        /* Kolory i poświaty hover dla każdego przycisku */
        .btn-sklep:hover { color: #ffaa00; border-color: #ffaa00; box-shadow: 0 0 30px rgba(255, 170, 0, 0.2); }
        .btn-rek:hover { color: var(--accent); border-color: var(--accent); box-shadow: 0 0 30px rgba(255, 0, 85, 0.2); }
        .btn-reg:hover { color: var(--secondary); border-color: var(--secondary); box-shadow: 0 0 30px rgba(112, 0, 255, 0.2); }
        .btn-dc:hover { color: #5865f2; border-color: #5865f2; box-shadow: 0 0 30px rgba(88, 101, 242, 0.2); }

        .cyber-btn:hover i { transform: scale(1.1); opacity: 1; }

        /* --- IP BAR --- */
        .ip-wrapper {
            margin-top: 50px;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px 40px;
            border-radius: 100px;
            display: inline-flex;
            align-items: center;
            gap: 20px;
            cursor: pointer;
            border: 1px solid var(--secondary);
            box-shadow: 0 0 20px rgba(112, 0, 255, 0.1);
            transition: 0.3s;
            transform: translateZ(10px);
        }
        .ip-wrapper:hover { transform: scale(1.05) translateZ(10px); box-shadow: 0 0 40px rgba(112, 0, 255, 0.3); border-color: var(--primary); }
        .ip-val { font-family: 'Syncopate', sans-serif; font-size: 1.4rem; color: #fff; letter-spacing: 2px; }
        .copy-tag { font-size: 0.7rem; font-weight: 900; background: var(--secondary); color: white; padding: 4px 10px; border-radius: 5px; text-transform: uppercase; }

        /* --- NOTIFICATION --- */
        #toast {
            position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%);
            background: var(--secondary); color: white; padding: 15px 40px;
            border-radius: 50px; font-weight: 900; transition: 0.5s ease-out;
            z-index: 1000; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        #toast.active { bottom: 40px; }

        /* Responsywność */
        @media (max-width: 768px) {
            .glitch-title { font-size: 2.8rem; letter-spacing: -2px; }
            .master-panel { padding: 40px 20px; border-radius: 30px; }
            .ip-wrapper { padding: 15px 25px; }
            .ip-val { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div id="bg-image"></div>
    <div id="bg-overlay"></div>

    <div class="master-panel" id="panel">
        <div class="logo-box">
            <img src="logo.png" alt="DuceMC" class="logo-img">
        </div>

        <h1 class="glitch-title">DUCEMC</h1>
        
        <p style="text-transform: uppercase; letter-spacing: 5px; font-size: 0.7rem; color: #666; margin-top: -30px; margin-bottom: 40px; font-weight: 700;">Elite Duel Experience</p>

        <div class="action-container">
            <a href="sklep.html" class="cyber-btn btn-sklep">
                <i>🛒</i>
                <span>Sklep</span>
            </a>
            <a href="rekrutacja.html" class="cyber-btn btn-rek">
                <i>✉️</i>
                <span>Rekrutacja</span>
            </a>
            <a href="regulamin.html" class="cyber-btn btn-reg">
                <i>📜</i>
                <span>Regulamin</span>
            </a>
            <a href="https://dc.ducemc.pl" class="cyber-btn btn-dc">
                <i>📱</i>
                <span>Discord</span>
            </a>
        </div>

        <div class="ip-wrapper" onclick="copyIP()">
            <span class="ip-val">DUCEMC.PL</span>
            <span class="copy-tag">KOPIUJ IP</span>
        </div>
    </div>

    <div id="toast">SYSTEM: IP SKOPIOWANE!</div>

    <script>
        const panel = document.getElementById('panel');
        const bgImage = document.getElementById('bg-image');
        
        // --- EFEKT PARALLAX DLA TŁA I PANELU (3D) ---
        window.addEventListener('mousemove', (e) => {
            // Obliczenia środka ekranu
            const screenCenterX = window.innerWidth / 2;
            const screenCenterY = window.innerHeight / 2;
            
            // Odchylenie myszki od środka
            const offsetX = (screenCenterX - e.pageX);
            const offsetY = (screenCenterY - e.pageY);

            // 1. Ruch panelu (obrót 3D) - delikatny
            const panelRotateX = offsetY / 50; 
            const panelRotateY = offsetX / 50;
            panel.style.transform = `rotateY(${-panelRotateY}deg) rotateX(${panelRotateX}deg)`;

            // 2. Ruch tła (przesunięcie) - w przeciwną stronę dla głębi
            const bgTranslateX = offsetX / 30; 
            const bgTranslateY = offsetY / 30;
            bgImage.style.transform = `translate(${bgTranslateX}px, ${bgTranslateY}px)`;
        });

        // --- FUNKCJA KOPIOWANIA IP ---
        function copyIP() {
            navigator.clipboard.writeText("DUCEMC.PL").then(() => {
                const t = document.getElementById('toast');
                t.classList.add('active');
                setTimeout(() => t.classList.remove('active'), 2500);
            }).catch(() => {
                alert("Nie udało się skopiować IP. Wpisz ręcznie: DUCEMC.PL");
            });
        }
    </script>
</body>
</html>

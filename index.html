<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DuceMC.PL | Strona Główna</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff;
            --accent: #3a7bd5;
            --bg-dark: #02060a;
            --glass: rgba(10, 25, 47, 0.85);
            --border: rgba(255, 255, 255, 0.1);
            
            /* Kolory Przycisków */
            --btn-shop: linear-gradient(135deg, #ffd700, #ffa500); /* Złoty */
            --btn-dc: linear-gradient(135deg, #5865f2, #4752c4);   /* Discord Blue */
            --btn-tt: linear-gradient(135deg, #ff0050, #00f2ea);   /* TikTok Mix */
            --btn-rec: linear-gradient(135deg, #2ecc71, #27ae60);  /* Green */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: default; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .bg-image {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('pobrane (1).jpg') center/cover no-repeat;
            filter: brightness(0.2) blur(10px);
            z-index: -2;
            transform: scale(1.1);
        }

        /* --- ELEMENTY POZA GUI --- */
        .donation-goal {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
            background: var(--glass); padding: 10px 25px; border-radius: 50px;
            border: 1px solid var(--border); z-index: 20; text-align: center;
        }
        .progress-bar { width: 200px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-top: 8px; overflow: hidden; }
        .progress-fill { width: 75%; height: 100%; background: var(--primary); box-shadow: 0 0 10px var(--primary); }

        .side-stats {
            position: fixed; bottom: 30px; left: 30px;
            background: var(--glass); padding: 20px; border-radius: 25px;
            border: 1px solid var(--border); z-index: 20;
        }

        .rules-widget {
            position: fixed; bottom: 30px; right: 30px;
            background: var(--btn-rec); color: white;
            padding: 15px 30px; border-radius: 50px;
            text-decoration: none; font-weight: 900; letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(46, 204, 113, 0.3);
            transition: 0.3s; z-index: 20; animation: float 3s infinite ease-in-out;
        }
        .rules-widget:hover { transform: scale(1.1); box-shadow: 0 15px 30px rgba(46, 204, 113, 0.5); }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* --- GŁÓWNE GUI --- */
        .container {
            display: grid; grid-template-columns: 1fr 1.5fr; gap: 30px;
            width: 95%; max-width: 1100px; z-index: 10; perspective: 1000px;
        }

        .glass-card {
            background: var(--glass); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 40px; padding: 45px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        h1 { font-size: 4rem; font-weight: 900; letter-spacing: -2px; margin-bottom: 10px; }

        .nav-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        
        .nav-link {
            padding: 25px; border-radius: 25px; text-decoration: none; color: white;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); text-align: center;
        }

        /* Klasy Kolorów Przycisków */
        .btn-shop { background: var(--btn-shop); }
        .btn-dc { background: var(--btn-dc); }
        .btn-tt { background: var(--btn-tt); }
        .btn-rec { background: var(--btn-rec); }

        .nav-link:hover { transform: translateY(-10px) rotate(2deg); filter: brightness(1.2); }
        .nav-link b { font-size: 1.2rem; display: block; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
        .nav-link span { font-size: 0.7rem; font-weight: 700; opacity: 0.9; text-transform: uppercase; }

        .ip-copy {
            width: 100%; background: white; color: black; padding: 20px;
            border-radius: 20px; border: none; font-weight: 900; font-size: 1.1rem;
            margin-top: 25px; cursor: pointer; transition: 0.3s;
        }
        .ip-copy:hover { background: var(--primary); color: white; transform: scale(1.02); }

        #notif {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: white; color: black; padding: 15px 40px; border-radius: 50px;
            font-weight: 900; transition: 0.5s; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #notif.show { top: 100px; }
    </style>
</head>
<body>

    <div class="bg-image"></div>

    <div class="donation-goal">
        <span style="font-size: 0.7rem; font-weight: 800;">CEL NA NOWĄ MASZYNĘ: 75%</span>
        <div class="progress-bar"><div class="progress-fill"></div></div>
    </div>

    <div class="side-stats">
        <div style="margin-bottom: 10px;">
            <span style="font-size: 0.6rem; opacity: 0.5; font-weight: 800;">REKORD GRACZY</span><br>
            <b style="font-size: 1.4rem; color: var(--primary);">842</b>
        </div>
        <div>
            <span style="font-size: 0.6rem; opacity: 0.5; font-weight: 800;">AKTUALNY SEZON</span><br>
            <b style="font-size: 1.4rem; color: #ffd700;">#1</b>
        </div>
    </div>

    <a href="regulamin.html" class="rules-widget">🛡️ REGULAMIN</a>

    <div class="container" id="tilt">
        <div class="glass-card">
            <div style="background: rgba(0,210,255,0.1); padding: 8px 15px; border-radius: 50px; display: inline-block; color: var(--primary); font-weight: 900; font-size: 0.7rem; margin-bottom: 20px;">
                ● SERWER ONLINE
            </div>
            <h1>DUCEMC</h1>
            <p style="opacity: 0.6; font-weight: 700; letter-spacing: 2px;">TRYB DUELS 1VS1</p>
            <button class="ip-copy" onclick="copyIP()">KOPIUJ IP SERWERA</button>
            <p style="text-align: center; margin-top: 15px; font-size: 0.7rem; opacity: 0.4;">WERSJA: 1.8 - 1.21</p>
        </div>

        <div class="glass-card">
            <p style="font-size: 0.7rem; font-weight: 900; letter-spacing: 3px; margin-bottom: 20px; opacity: 0.5;">NAWIGACJA</p>
            <div class="nav-buttons">
                <a href="sklep.html" class="nav-link btn-shop">
                    <b>SKLEP</b>
                    <span>Itemshop</span>
                </a>
                <a href="https://dc.ducemc.pl" class="nav-link btn-dc">
                    <b>DISCORD</b>
                    <span>Społeczność</span>
                </a>
                <a href="tiktok.html" class="nav-link btn-tt">
                    <b>TIKTOK</b>
                    <span>Nowe Filmy</span>
                </a>
                <a href="rekrutacja.html" class="nav-link btn-rec">
                    <b>EKIPA</b>
                    <span>Rekrutacja</span>
                </a>
            </div>
        </div>
    </div>

    <div id="notif">SKOPIOWANO: DUCEMC.PL</div>

    <script>
        function copyIP() {
            navigator.clipboard.writeText("DUCEMC.PL");
            const n = document.getElementById('notif');
            n.classList.add('show');
            setTimeout(() => n.classList.remove('show'), 2000);
        }

        const scene = document.getElementById('tilt');
        window.addEventListener('mousemove', (e) => {
            let x = (window.innerWidth / 2 - e.pageX) / 50;
            let y = (window.innerHeight / 2 - e.pageY) / 50;
            scene.style.transform = `rotateY(${-x}deg) rotateX(${y}deg)`;
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DuceMC.PL | Officjalna Strona</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Montserrat:wght@300;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00f2ff;
            --shop: #ffaa00;
            --discord: #5865f2;
            --rec: #00ff88;
            --bg: #020205;
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: white;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            perspective: 2000px;
        }

        /* --- BACKGROUND ANIMATION --- */
        .bg-gradient {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(0, 242, 255, 0.15) 0%, transparent 50%);
            z-index: -1;
        }

        canvas { position: fixed; top: 0; left: 0; z-index: -2; opacity: 0.4; }

        /* --- MAIN PORTAL --- */
        .portal {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 60px;
            padding: 80px 60px;
            width: 90%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 50px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            transform-style: preserve-3d;
            transition: transform 0.1s;
        }

        /* --- LOGO SECTION --- */
        .logo-container {
            position: relative;
            transform: translateZ(50px);
        }
        .logo-main {
            width: 180px;
            filter: drop-shadow(0 0 30px var(--primary));
            animation: float 5s ease-in-out infinite;
            z-index: 2;
            position: relative;
        }
        .logo-aura {
            position: absolute; top: 50%; left: 50%;
            width: 250px; height: 250px;
            background: var(--primary);
            filter: blur(100px);
            opacity: 0.3;
            transform: translate(-50%, -50%);
            border-radius: 50%;
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        .server-name {
            font-family: 'Syncopate', sans-serif;
            font-size: 4.5rem;
            font-weight: 700;
            letter-spacing: -5px;
            background: linear-gradient(to bottom, #fff 30%, #444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-top: -20px;
        }

        /* --- HYPER BUTTONS GRID --- */
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            width: 100%;
        }

        .nav-btn {
            position: relative;
            padding: 30px 20px;
            border-radius: 25px;
            text-decoration: none;
            color: white;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 0.8rem;
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .nav-btn i { font-size: 1.5rem; transition: var(--transition); }

        /* Color Themes & Light Animations */
        .btn-shop:hover { border-color: var(--shop); box-shadow: 0 0 40px rgba(255, 170, 0, 0.3); background: rgba(255, 170, 0, 0.05); }
        .btn-rec:hover { border-color: var(--rec); box-shadow: 0 0 40px rgba(0, 255, 136, 0.3); background: rgba(0, 255, 136, 0.05); }
        .btn-reg:hover { border-color: var(--primary); box-shadow: 0 0 40px rgba(0, 242, 255, 0.3); background: rgba(0, 242, 255, 0.05); }
        .btn-dc:hover { border-color: var(--discord); box-shadow: 0 0 40px rgba(88, 101, 242, 0.3); background: rgba(88, 101, 242, 0.05); }

        .nav-btn::before {
            content: '';
            position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, transparent, rgba(255,255,255,0.1));
            animation: rotate 4s linear infinite;
            opacity: 0;
            transition: 0.3s;
        }
        .nav-btn:hover::before { opacity: 1; }
        @keyframes rotate { to { transform: rotate(360deg); } }

        /* --- IP PANEL --- */
        .ip-bar {
            background: rgba(0, 0, 0, 0.4);
            border: 1px dashed var(--primary);
            padding: 15px 40px;
            border-radius: 50px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .ip-bar:hover { background: var(--primary); color: black; transform: scale(1.05); }
        .ip-bar .ip-text { font-family: 'Syncopate', sans-serif; font-weight: 700; letter-spacing: 2px; }

        /* --- STATUS DOT --- */
        .status {
            display: flex; align-items: center; gap: 8px; font-size: 0.7rem; font-weight: 900;
            color: var(--rec); text-transform: uppercase;
        }
        .dot { width: 8px; height: 8px; background: var(--rec); border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(0, 255, 136, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0); } }

        #notif {
            position: fixed; bottom: 30px; background: white; color: black;
            padding: 12px 30px; border-radius: 40px; font-weight: 900; font-size: 0.8rem;
            display: none; animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100px); } to { transform: translateY(0); } }

        @media (max-width: 900px) {
            .nav-grid { grid-template-columns: 1fr 1fr; }
            .server-name { font-size: 2.5rem; letter-spacing: -2px; }
            .portal { padding: 40px 20px; }
        }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>
    <canvas id="stars"></canvas>

    <div class="portal" id="portal">
        <div class="logo-container">
            <div class="logo-aura"></div>
            <img src="logo.png" alt="DuceMC" class="logo-main">
        </div>

        <h1 class="server-name">DUCEMC.PL</h1>

        <div class="status">
            <div class="dot"></div> Serwer jest Online: 124 graczy
        </div>

        <div class="nav-grid">
            <a href="sklep.html" class="nav-btn btn-shop">
                <span>🛒</span>
                SKLEP PREMIUM
            </a>
            <a href="rekrutacja.html" class="nav-btn btn-rec">
                <span>✉️</span>
                REKRUTACJA
            </a>
            <a href="regulamin.html" class="nav-btn btn-reg">
                <span>📜</span>
                REGULAMIN
            </a>
            <a href="https://dc.ducemc.pl" class="nav-btn btn-dc">
                <span>📱</span>
                DISCORD
            </a>
        </div>

        <div class="ip-bar" onclick="copyIP()">
            <span class="ip-text">IP: DUCEMC.PL</span>
            <span style="font-size: 0.6rem; opacity: 0.6;">KLIKNIJ ABY SKOPIOWAĆ</span>
        </div>
    </div>

    <div id="notif">IP SKOPIOWANE DO SCHOWKA!</div>

    <script>
        const portal = document.getElementById('portal');
        const bg = document.querySelector('.bg-gradient');

        // Dynamiczne światło tła i ruch 3D
        window.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) * 100;
            const y = (e.clientY / window.innerHeight) * 100;
            bg.style.setProperty('--x', x + '%');
            bg.style.setProperty('--y', y + '%');

            const rotateX = (window.innerHeight / 2 - e.clientY) / 50;
            const rotateY = (window.innerWidth / 2 - e.clientX) / 50;
            portal.style.transform = `rotateX(${rotateX}deg) rotateY(${-rotateY}deg)`;
        });

        function copyIP() {
            navigator.clipboard.writeText("DUCEMC.PL");
            const n = document.getElementById('notif');
            n.style.display = 'block';
            setTimeout(() => n.style.display = 'none', 2500);
        }

        // Gwiazdy w tle
        const canvas = document.getElementById('stars');
        const ctx = canvas.getContext('2d');
        let points = [];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            points = [];
            for(let i=0; i<100; i++) {
                points.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    v: Math.random() * 0.5 + 0.2
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(0, 242, 255, 0.3)";
            points.forEach(p => {
                p.y -= p.v;
                if(p.y < 0) p.y = canvas.height;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 1, 0, Math.PI*2);
                ctx.fill();
            });
            requestAnimationFrame(animate);
        }

        init();
        animate();
        window.onresize = init;
    </script>
</body>
</html>

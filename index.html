<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DuceMC.PL | Official Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #bc13fe; /* Neon Purple */
            --secondary: #ff0055; /* Hot Pink */
            --gold: #ffcc00;
            --bg-dark: #050208;
            --glass: rgba(15, 15, 25, 0.7);
            --border-light: rgba(255, 255, 255, 0.1);
            --smooth: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            perspective: 1000px;
        }

        /* --- TŁO PARALLAX (BEZ WIBRACJI) --- */
        #bg-image {
            position: fixed;
            top: -5%; left: -5%;
            width: 110%; height: 110%;
            background-image: url('obraz1.png'); 
            background-size: cover;
            background-position: center;
            z-index: -2;
            filter: brightness(0.5) contrast(1.2) saturate(1.2);
            transition: transform 0.8s cubic-bezier(0.2, 0, 0.2, 1); /* Bardzo wolne i płynne */
        }

        #bg-overlay {
            position: fixed; inset: 0;
            background: radial-gradient(circle at center, rgba(5, 2, 8, 0.2) 0%, var(--bg-dark) 80%);
            z-index: -1;
        }

        /* --- GŁÓWNY PANEL --- */
        .master-panel {
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border-light);
            border-radius: 50px;
            padding: 70px 50px;
            width: 90%;
            max-width: 1100px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            transform-style: preserve-3d;
            transition: transform 0.2s ease-out; /* Szybka ale wygładzona reakcja */
            position: relative;
        }

        /* --- LOGO I NOWOCZESNY TYTUŁ --- */
        .logo-box { margin-bottom: 25px; transform: translateZ(50px); }
        .logo-img { 
            width: 150px; 
            filter: drop-shadow(0 0 25px var(--primary));
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        .main-title {
            font-family: 'Syncopate', sans-serif;
            font-size: 5.5rem;
            font-weight: 700;
            letter-spacing: -4px;
            background: linear-gradient(180deg, #fff 0%, #a445ed 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
            filter: drop-shadow(0 0 15px rgba(188, 19, 254, 0.4));
            transform: translateZ(80px);
        }

        /* --- MENU - GRID --- */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: 20px;
            transform: translateZ(40px);
        }

        .menu-item {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-light);
            padding: 30px 15px;
            border-radius: 25px;
            text-decoration: none;
            color: #fff;
            transition: var(--smooth);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            overflow: hidden;
        }

        .menu-item i { font-size: 2rem; transition: var(--smooth); color: rgba(255,255,255,0.6); }

        /* Hover Styles */
        .menu-item:hover {
            background: rgba(255, 255, 255, 0.07);
            transform: translateY(-10px) scale(1.02);
            border-color: var(--primary);
            box-shadow: 0 15px 35px rgba(188, 19, 254, 0.2);
        }

        .menu-item:hover i { color: #fff; transform: scale(1.2); filter: drop-shadow(0 0 10px var(--primary)); }

        /* Rekrutacja ma złoty akcent */
        .btn-rek:hover { border-color: var(--gold); box-shadow: 0 15px 35px rgba(255, 204, 0, 0.2); }
        .btn-rek:hover i { filter: drop-shadow(0 0 10px var(--gold)); }

        /* --- IP PANEL --- */
        .ip-footer {
            margin-top: 60px;
            transform: translateZ(30px);
        }

        .ip-button {
            background: linear-gradient(90deg, #1a1a2e, #0f0f1a);
            border: 1px solid var(--primary);
            padding: 18px 45px;
            border-radius: 100px;
            display: inline-flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: var(--smooth);
        }

        .ip-button:hover {
            transform: scale(1.08);
            box-shadow: 0 0 40px rgba(188, 19, 254, 0.4);
            background: var(--primary);
        }

        .ip-button .val { font-family: 'Syncopate', sans-serif; font-size: 1.5rem; letter-spacing: 2px; }
        .ip-button .label { font-size: 0.7rem; background: rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 20px; }

        /* --- NOTIF --- */
        #toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: var(--primary); padding: 15px 40px; border-radius: 40px;
            font-weight: 700; transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 9999;
        }
        #toast.show { top: 40px; }

        @media (max-width: 900px) {
            .menu-grid { grid-template-columns: 1fr 1fr; }
            .main-title { font-size: 3rem; }
            .master-panel { padding: 40px 20px; }
        }
    </style>
</head>
<body>

    <div id="bg-image"></div>
    <div id="bg-overlay"></div>

    <div class="master-panel" id="mainPanel">
        <div class="logo-box">
            <img src="logo.png" alt="Logo" class="logo-img">
        </div>

        <h1 class="main-title">DUCEMC</h1>
        
        <p style="letter-spacing: 8px; font-size: 0.8rem; color: #888; margin-top: -35px; margin-bottom: 50px; font-weight: 300; text-transform: uppercase;">Discover the power of skill</p>

        <nav class="menu-grid">
            <a href="sklep.html" class="menu-item">
                <i>🛒</i>
                <span>Sklep</span>
            </a>
            <a href="rekrutacja.html" class="menu-item btn-rek">
                <i>✉️</i>
                <span>Rekrutacja</span>
            </a>
            <a href="regulamin.html" class="menu-item">
                <i>📜</i>
                <span>Regulamin</span>
            </a>
            <a href="https://dc.ducemc.pl" class="menu-item">
                <i>💬</i>
                <span>Discord</span>
            </a>
        </nav>

        <div class="ip-footer">
            <div class="ip-button" onclick="copyIP()">
                <span class="label">KLIKNIJ ABY SKOPIOWAĆ</span>
                <span class="val">DUCEMC.PL</span>
            </div>
        </div>
    </div>

    <div id="toast">SKOPIOWANO ADRES IP!</div>

    <script>
        const panel = document.getElementById('mainPanel');
        const bg = document.getElementById('bg-image');
        
        // --- SMOOTH MOUSE TRACKING (BEZ WIBRACJI) ---
        let mouseX = 0, mouseY = 0;
        let currentX = 0, currentY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = (window.innerWidth / 2 - e.pageX) / 45;
            mouseY = (window.innerHeight / 2 - e.pageY) / 45;
        });

        function animate() {
            // "Lerp" - current dogania mouseX powoli, co eliminuje drgania
            currentX += (mouseX - currentX) * 0.1;
            currentY += (mouseY - currentY) * 0.1;

            panel.style.transform = `rotateY(${-currentX}deg) rotateX(${currentY}deg)`;
            bg.style.transform = `scale(1.1) translate(${currentX * 2}px, ${currentY * 2}px)`;

            requestAnimationFrame(animate);
        }
        animate();

        function copyIP() {
            navigator.clipboard.writeText("DUCEMC.PL");
            const t = document.getElementById('toast');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>

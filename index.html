<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DuceMC.PL | Strona Główna</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff;
            --accent: #3a7bd5;
            --bg-dark: #02060a;
            --glass: rgba(10, 25, 47, 0.85);
            --border: rgba(0, 210, 255, 0.2);
            --glow: rgba(0, 210, 255, 0.4);
            --tiktok: #ff0050;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: default; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: radial-gradient(circle at center, #0a192f 0%, #02060a 100%);
        }

        .bg-image {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('pobrane (1).jpg') center/cover no-repeat;
            filter: brightness(0.2) blur(8px);
            z-index: -2;
            transform: scale(1.1);
        }

        #bubbles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        .container {
            display: grid;
            grid-template-columns: 1fr 1.6fr;
            gap: 30px;
            width: 95%;
            max-width: 1150px;
            z-index: 10;
            perspective: 2000px;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 50px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            transition: transform 0.2s cubic-bezier(0.2, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .status-badge {
            background: rgba(0, 210, 255, 0.1);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 10px 22px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 900;
            margin-bottom: 30px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        
        .dot { width: 10px; height: 10px; background: var(--primary); border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.2); } }

        h1 {
            font-size: 4.5rem;
            font-weight: 900;
            line-height: 0.9;
            letter-spacing: -3px;
            background: linear-gradient(to bottom, #ffffff 30%, #a2e4ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .ip-button {
            width: 100%;
            margin-top: 35px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: #fff;
            padding: 22px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            border: none;
            box-shadow: 0 15px 35px rgba(0, 210, 255, 0.3);
            transition: 0.4s;
        }
        .ip-button:hover { transform: translateY(-5px); box-shadow: 0 20px 45px var(--glow); }

        .nav-buttons { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            margin-top: 20px;
        }
        
        .nav-link {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            padding: 25px;
            border-radius: 25px;
            text-decoration: none;
            color: white;
            transition: 0.3s;
        }
        
        .nav-link:hover { 
            background: rgba(255,255,255,0.06); 
            border-color: var(--primary); 
            transform: translateY(-5px);
        }
        
        .nav-link b { font-size: 1.1rem; display: block; margin-bottom: 4px; }
        .nav-link span { font-size: 0.7rem; opacity: 0.4; text-transform: uppercase; font-weight: 600; }

        .upcoming-badge {
            margin-top: 30px;
            padding: 15px;
            background: rgba(0,210,255,0.05);
            border-radius: 20px;
            border: 1px dashed var(--border);
            text-align: center;
            font-size: 0.8rem;
            color: var(--primary);
        }

        .footer-stats {
            position: fixed; bottom: 30px;
            display: flex; align-items: center; gap: 20px;
            padding: 12px 30px;
            background: rgba(10, 25, 47, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 100px;
            border: 1px solid var(--border);
            z-index: 10;
        }

        #notif {
            position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%);
            background: var(--primary); color: #000; padding: 15px 40px;
            border-radius: 100px; font-weight: 900; transition: 0.5s; z-index: 100;
        }
        #notif.show { bottom: 120px; }

        @media (max-width: 950px) {
            .container { grid-template-columns: 1fr; }
            body { overflow-y: auto; padding: 40px 10px; }
        }
    </style>
</head>
<body>

    <div class="bg-image"></div>
    <canvas id="bubbles"></canvas>

    <div class="container" id="tilt-scene">
        <div class="glass-card">
            <div class="status-badge">
                <div class="dot"></div>
                <span id="player-count">ŁADOWANIE...</span>
            </div>
            <h1>DUCEMC</h1>
            <p style="color: var(--primary); font-weight: 900; letter-spacing: 4px; font-size: 0.85rem;">DUELS 1VS1</p>
            
            <button class="ip-button" onclick="copyIP()">KOPIUJ IP SERWERA</button>
            
            <div style="margin-top: 35px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div style="background: rgba(255,255,255,0.02); padding: 15px; border-radius: 15px; text-align: center;">
                    <span style="font-size: 0.6rem; opacity: 0.4;">REKORD</span><br>
                    <b style="color: var(--primary);">842</b>
                </div>
                <div style="background: rgba(255,255,255,0.02); padding: 15px; border-radius: 15px; text-align: center;">
                    <span style="font-size: 0.6rem; opacity: 0.4;">SEZON</span><br>
                    <b style="color: var(--primary);">#1</b>
                </div>
            </div>
        </div>

        <div class="glass-card">
            <p style="font-size: 0.7rem; font-weight: 900; letter-spacing: 5px; color: var(--primary); margin-bottom: 15px;">MENU SERWERA</p>
            
            <div class="nav-buttons">
                <a href="sklep.html" class="nav-link">
                    <b>SKLEP</b>
                    <span>Itemshop</span>
                </a>
                <a href="https://dc.ducemc.pl" class="nav-link" style="border-bottom: 3px solid #5865f2;">
                    <b style="color: #5865f2;">DISCORD</b>
                    <span>Społeczność</span>
                </a>
                <a href="tiktok.html" class="nav-link" style="border-bottom: 3px solid var(--tiktok);">
                    <b style="color: var(--tiktok);">TIKTOK</b>
                    <span>Filmy i Newsy</span>
                </a>
                <a href="rekrutacja.html" class="nav-link">
                    <b>REKRUTACJA</b>
                    <span>Dołącz do nas</span>
                </a>
            </div>
            
            <div class="upcoming-badge">
                ✨ Nowa edycja Duels już w sobotę o 18:00!
            </div>
        </div>
    </div>

    <div class="footer-stats">
        <span style="font-size: 0.7rem; font-weight: 900; opacity: 0.6;">TOP DONATORZY:</span>
        <div style="display: flex; gap: 8px;">
            <img src="https://cravatar.eu/avatar/MHF_Steve/24.png" style="border-radius: 5px;" alt="S">
            <img src="https://cravatar.eu/avatar/TugareK/24.png" style="border-radius: 5px;" alt="T">
        </div>
    </div>

    <div id="notif">SKOPIOWANO: DUCEMC.PL</div>

    <script>
        // ... (Twój istniejący skrypt od bąbelków i kopiowania - bez zmian) ...
        async function updatePlayers() {
            try {
                const response = await fetch('https://api.minecraft-lista.pl/v1/players/ducemc.pl');
                const data = await response.json();
                document.getElementById('player-count').innerText = (data.players !== undefined) 
                    ? `${data.players} GRACZY ONLINE` : "409 GRACZY ONLINE";
            } catch (e) { document.getElementById('player-count').innerText = "409 GRACZY ONLINE"; }
        }
        updatePlayers();

        const canvas = document.getElementById('bubbles');
        const ctx = canvas.getContext('2d');
        let bubbles = [];
        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            bubbles = [];
            for(let i=0; i<40; i++) bubbles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*1.5+0.5, v: Math.random()*0.5+0.2, o: Math.random()*0.3 });
        }
        function animate() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            bubbles.forEach(b => { ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fillStyle = `rgba(0, 210, 255, ${b.o})`; ctx.fill(); b.y -= b.v; if(b.y < -20) b.y = canvas.height+20; });
            requestAnimationFrame(animate);
        }
        window.addEventListener('resize', init);
        init(); animate();

        const scene = document.getElementById('tilt-scene');
        window.addEventListener('mousemove', (e) => {
            let x = (window.innerWidth / 2 - e.pageX) / 80;
            let y = (window.innerHeight / 2 - e.pageY) / 80;
            scene.style.transform = `rotateY(${-x}deg) rotateX(${y}deg)`;
        });

        function copyIP() {
            navigator.clipboard.writeText("DUCEMC.PL");
            const n = document.getElementById('notif');
            n.classList.add('show');
            setTimeout(() => n.classList.remove('show'), 2500);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DuceMC.PL | The Next Era</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #ff0055; /* Hot Pink/Crimson */
            --secondary: #7000ff; /* Electric Purple */
            --bg-start: #0a0510;
            --bg-end: #1a0a2e;
            --text-glow: 0 0 20px rgba(255, 0, 85, 0.6);
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
            color: white;
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            perspective: 1500px;
        }

        /* --- ANIMOWANA TAPETA --- */
        #canvas-web {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; opacity: 0.5;
            background: radial-gradient(circle at 50% 50%, #2a0a4a 0%, transparent 80%);
        }

        /* --- GŁÓWNY KONTENER --- */
        .master-panel {
            background: rgba(15, 10, 25, 0.7);
            backdrop-filter: blur(50px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 60px;
            width: 90%;
            max-width: 1000px;
            text-align: center;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
            transform-style: preserve-3d;
            animation: panelEntrance 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes panelEntrance {
            from { opacity: 0; transform: scale(0.8) rotateX(20deg); }
            to { opacity: 1; transform: scale(1) rotateX(0); }
        }

        /* --- LOGO I TYTUŁ --- */
        .logo-box { position: relative; display: inline-block; margin-bottom: 20px; }
        .logo-img { width: 140px; animation: hoverAni 4s ease-in-out infinite; z-index: 5; position: relative; }
        
        @keyframes hoverAni { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-15px) scale(1.05); } }

        .glitch-title {
            font-family: 'Syncopate', sans-serif;
            font-size: 5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: -6px;
            position: relative;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
        }
        .glitch-title::after {
            content: 'DUCEMC';
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: transparent; -webkit-background-clip: text;
            color: var(--accent); opacity: 0.3; transform: translate(-4px, 2px); z-index: -1;
        }

        /* --- PRZYCISKI - NOWY DESIGN --- */
        .action-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .cyber-btn {
            position: relative;
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 20px;
            text-decoration: none;
            color: #fff;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            overflow: hidden;
            transition: all 0.4s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .cyber-btn i { font-size: 1.8rem; margin-bottom: 5px; opacity: 0.7; transition: 0.4s; }

        /* Unikalne kolory dla przycisków */
        .btn-sklep:hover { color: #ffaa00; border-color: #ffaa00; box-shadow: 0 0 30px rgba(255, 170, 0, 0.2); }
        .btn-rek:hover { color: var(--accent); border-color: var(--accent); box-shadow: 0 0 30px rgba(255, 0, 85, 0.2); }
        .btn-reg:hover { color: var(--secondary); border-color: var(--secondary); box-shadow: 0 0 30px rgba(112, 0, 255, 0.2); }
        .btn-dc:hover { color: #5865f2; border-color: #5865f2; box-shadow: 0 0 30px rgba(88, 101, 242, 0.2); }

        .cyber-btn:hover i { transform: scale(1.2) translateY(-5px); opacity: 1; }

        /* --- IP BAR --- */
        .ip-wrapper {
            margin-top: 50px;
            background: rgba(0, 0, 0, 0.5);
            padding: 20px 40px;
            border-radius: 100px;
            display: inline-flex;
            align-items: center;
            gap: 20px;
            cursor: pointer;
            border: 1px solid var(--accent);
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.1);
            transition: 0.3s;
        }
        .ip-wrapper:hover { transform: scale(1.05); box-shadow: 0 0 40px rgba(255, 0, 85, 0.3); }
        .ip-val { font-family: 'Syncopate', sans-serif; font-size: 1.4rem; color: #fff; }
        .copy-tag { font-size: 0.7rem; font-weight: 900; background: var(--accent); color: white; padding: 4px 10px; border-radius: 5px; }

        /* --- NOTIFICATION --- */
        #toast {
            position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%);
            background: var(--accent); color: white; padding: 15px 40px;
            border-radius: 50px; font-weight: 900; transition: 0.5s;
        }
        #toast.active { bottom: 40px; }

        @media (max-width: 768px) {
            .glitch-title { font-size: 2.8rem; letter-spacing: -2px; }
            .master-panel { padding: 30px; }
        }
    </style>
</head>
<body>

    <canvas id="canvas-web"></canvas>

    <div class="master-panel" id="panel">
        <div class="logo-box">
            <img src="logo.png" alt="DuceMC" class="logo-img">
        </div>

        <h1 class="glitch-title">DUCEMC</h1>
        
        <p style="text-transform: uppercase; letter-spacing: 5px; font-size: 0.7rem; opacity: 0.5; margin-top: -30px; margin-bottom: 40px;">Elite Duel Experience</p>

        <div class="action-container">
            <a href="sklep.html" class="cyber-btn btn-sklep">
                <i>🛒</i>
                <span>Sklep</span>
            </a>
            <a href="rekrutacja.html" class="cyber-btn btn-rek">
                <i>✉️</i>
                <span>Rekrutacja</span>
            </a>
            <a href="regulamin.html" class="cyber-btn btn-reg">
                <i>📜</i>
                <span>Regulamin</span>
            </a>
            <a href="https://dc.ducemc.pl" class="cyber-btn btn-dc">
                <i>📱</i>
                <span>Discord</span>
            </a>
        </div>

        <div class="ip-wrapper" onclick="copyIP()">
            <span class="ip-val">DUCEMC.PL</span>
            <span class="copy-tag">KOPIUJ IP</span>
        </div>
    </div>

    <div id="toast">SYSTEM: IP SKOPIOWANE!</div>

    <script>
        const panel = document.getElementById('panel');
        
        // Dynamiczna interakcja z panelem (3D Tilt)
        window.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 40;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 40;
            panel.style.transform = `rotateY(${xAxis}deg) rotateX(${-yAxis}deg)`;
        });

        // Tło - Animowane sześciany i siatka
        const canvas = document.getElementById('canvas-web');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for(let i=0; i<60; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 1,
                    speed: Math.random() * 0.5 + 0.1,
                    opacity: Math.random() * 0.5
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.y -= p.speed;
                if(p.y < 0) p.y = canvas.height;
                ctx.fillStyle = `rgba(255, 0, 85, ${p.opacity})`;
                ctx.beginPath();
                ctx.rect(p.x, p.y, p.size, p.size); // Rysujemy małe kwadraciki/pixele
                ctx.fill();
            });
            requestAnimationFrame(animate);
        }

        function copyIP() {
            navigator.clipboard.writeText("DUCEMC.PL");
            const t = document.getElementById('toast');
            t.classList.add('active');
            setTimeout(() => t.classList.remove('active'), 2500);
        }

        window.addEventListener('resize', init);
        init();
        animate();
    </script>
</body>
</html>

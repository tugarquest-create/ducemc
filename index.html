<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DuceMC.PL - Serwer Minecraft</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00ff88; /* Neonowa zieleń serwerowa */
            --bg-dark: #0a0b10;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-main: #ffffff;
            --accent-gradient: linear-gradient(45deg, #00ff88, #00bdff);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Tło z poświatą w rogu */
        body::before {
            content: "";
            position: fixed;
            top: -10%; left: -10%;
            width: 40%; height: 40%;
            background: radial-gradient(circle, rgba(0, 255, 136, 0.1) 0%, transparent 70%);
            z-index: -1;
        }

        /* Nawigacja */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 10%;
            background: rgba(10, 11, 16, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 24px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .logo span {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 25px;
        }

        nav ul li a {
            color: #bbb;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
            font-size: 0.95rem;
        }

        nav ul li a:hover {
            color: var(--primary);
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        /* Header / Hero Section */
        header {
            height: 85vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 900;
            margin-bottom: 15px;
            letter-spacing: -2px;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            font-size: 1.2rem;
            color: #aaa;
            margin-bottom: 40px;
            max-width: 600px;
        }

        /* Przycisk IP */
        .ip-box {
            background: var(--card-bg);
            padding: 20px 40px;
            border: 1px solid rgba(0, 255, 136, 0.2);
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .ip-box:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 15px 35px rgba(0, 255, 136, 0.15);
            background: rgba(255, 255, 255, 0.08);
        }

        .ip-box .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #666;
        }

        .ip-box .address {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
            font-family: monospace;
        }

        /* Komunikat o skopiowaniu (mały toast) */
        #copy-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary);
            color: #000;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: bold;
            display: none;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { bottom: 0; opacity: 0; }
            to { bottom: 30px; opacity: 1; }
        }

        /* Responsywność dla telefonów */
        @media (max-width: 768px) {
            nav {
                flex-direction: column;
                gap: 15px;
            }
            nav ul {
                gap: 15px;
                font-size: 0.8rem;
            }
            h1 { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">DuceMC<span>.PL</span></div>
        <ul>
            <li><a href="index.html">Start</a></li>
            <li><a href="sklep.html">Sklep</a></li>
            <li><a href="discord.html">Discord</a></li>
            <li><a href="regulamin.html">Regulamin</a></li>
            <li><a href="rekrutacja.html">Rekrutacja</a></li>
        </ul>
    </nav>

    <header>
        <h1>Witaj na DuceMC</h1>
        <p>Dołącz do najlepszej społeczności Minecraft i przeżyj przygodę na najwyższym poziomie wydajności.</p>
        
        <div class="ip-box" onclick="copyIP()">
            <span class="label">Kliknij, aby skopiować</span>
            <span class="address">play.ducemc.pl</span>
        </div>
    </header>

    <div id="copy-toast">Skopiowano adres IP!</div>

    <script>
        function copyIP() {
            const ip = "play.ducemc.pl";
            navigator.clipboard.writeText(ip);
            
            const toast = document.getElementById("copy-toast");
            toast.style.display = "block";
            
            setTimeout(() => {
                toast.style.display = "none";
            }, 3000);
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekrutacja | DuceMC.PL</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00bcd4;
            --bg-dark: #020205;
            --card-bg: rgba(10, 10, 15, 0.95);
            --transition: all 0.3s ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-dark);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        #hero-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        .rec-card {
            background: var(--card-bg);
            border: 1px solid rgba(0, 188, 212, 0.2);
            border-radius: 30px;
            padding: 40px;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
        }

        h2 { font-weight: 900; font-size: 2.2rem; color: var(--primary); margin-bottom: 10px; text-align: center; letter-spacing: 2px; }
        p.subtitle { text-align: center; color: #777; font-size: 0.8rem; margin-bottom: 35px; text-transform: uppercase; font-weight: 700; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full-width { grid-column: span 2; }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.7rem; font-weight: 900; margin-bottom: 8px; color: #aaa; text-transform: uppercase; }
        
        input, textarea, select {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-family: inherit;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        input:focus, textarea:focus, select:focus {
            border-color: var(--primary);
            background: rgba(0, 188, 212, 0.05);
            outline: none;
        }

        select option { background: #111; color: white; }

        textarea { resize: vertical; min-height: 120px; }

        .submit-btn {
            width: 100%;
            padding: 20px;
            background: var(--primary);
            border: none;
            border-radius: 15px;
            color: white;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
            letter-spacing: 1px;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 188, 212, 0.4);
            filter: brightness(1.1);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: #555;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 700;
            transition: var(--transition);
        }
        .back-link:hover { color: white; }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <canvas id="hero-canvas"></canvas>

    <div class="rec-card">
        <h2>REKRUTACJA</h2>
        <p class="subtitle">Zasil szeregi administracji DuceMC.PL</p>

        <form id="rec-form">
            <div class="form-grid">
                <div class="form-group">
                    <label>Nick z Minecraft</label>
                    <input type="text" id="mc_nick" placeholder="Twój nick" required>
                </div>

                <div class="form-group">
                    <label>Imię i Wiek</label>
                    <input type="text" id="age" placeholder="Np. Marek, 16 lat" required>
                </div>

                <div class="form-group">
                    <label>Discord (Tag)</label>
                    <input type="text" id="dc_tag" placeholder="nick#0000 lub nick" required>
                </div>

                <div class="form-group">
                    <label>Stanowisko</label>
                    <select id="rank">
                        <option value="Admin">Admin</option>
                        <option value="Moderator">Moderator</option>
                        <option value="Helper">Helper</option>
                        <option value="Budowniczy">Budowniczy</option>
                        <option value="Trial">Trial (Testowy)</option>
                    </select>
                </div>

                <div class="form-group full-width">
                    <label>Od kiedy grasz na naszym serwerze?</label>
                    <input type="text" id="since_when" placeholder="Np. od startu edycji, od miesiąca..." required>
                </div>

                <div class="form-group full-width">
                    <label>Dlaczego Ty powinieneś otrzymać tę rangę?</label>
                    <textarea id="why_me" placeholder="Napisz coś o sobie, swoim doświadczeniu i dlaczego to właśnie Ciebie mamy wybrać..." required></textarea>
                </div>

                <div class="form-group full-width">
                    <label>Znajomość komend administracyjnych (1-10)</label>
                    <input type="number" id="commands" min="1" max="10" placeholder="Oceń swoje umiejętności" required>
                </div>

                <div class="form-group full-width">
                    <label>Ile czasu dziennie możesz poświęcić na serwer?</label>
                    <input type="text" id="time" placeholder="Np. Pon-Pt: 3h, Weekendy: 6h" required>
                </div>

                <div class="form-group full-width">
                    <label>Czy pełniłeś już kiedyś podobną funkcję?</label>
                    <textarea id="experience" placeholder="Wymień serwery lub opisz nabyte doświadczenie..." required></textarea>
                </div>
            </div>

            <button type="submit" class="submit-btn">WYŚLIJ MOJE ZGŁOSZENIE</button>
        </form>

        <a href="index.html" class="back-link">← WRÓĆ DO STRONY GŁÓWNEJ</a>
    </div>

    <script>
        const canvas = document.getElementById('hero-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            stars = [];
            for(let i=0; i<100; i++) stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*2});
        }
        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "rgba(0, 188, 212, 0.2)";
            stars.forEach(s => {
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
                ctx.fill();
            });
            requestAnimationFrame(draw);
        }
        window.addEventListener('resize', init);
        init(); draw();

        // Obsługa wysyłania
        document.getElementById('rec-form').addEventListener('submit', (e) => {
            e.preventDefault();
            // Tutaj w przyszłości dodamy kod wysyłający na Discord Webhook
            alert("Zgłoszenie zostało wysłane pomyślnie! Czekaj na kontakt na Discordzie.");
            window.location.href = "index.html";
        });
    </script>
</body>
</html>

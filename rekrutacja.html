<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekrutacja | DuceMC.PL</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00bcd4;
            --bg-dark: #020205;
            --card-bg: rgba(10, 10, 15, 0.95);
            --transition: all 0.3s ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-dark);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        #hero-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        .rec-card {
            background: var(--card-bg);
            border: 1px solid rgba(0, 188, 212, 0.2);
            border-radius: 30px;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
        }

        h2 { font-weight: 900; font-size: 2rem; color: var(--primary); margin-bottom: 10px; text-align: center; }
        p.subtitle { text-align: center; color: #777; font-size: 0.8rem; margin-bottom: 30px; text-transform: uppercase; }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.7rem; font-weight: 900; margin-bottom: 8px; color: #aaa; text-transform: uppercase; }
        
        input, textarea, select {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-family: inherit;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        input:focus, textarea:focus {
            border-color: var(--primary);
            background: rgba(0, 188, 212, 0.05);
            outline: none;
        }

        textarea { resize: vertical; min-height: 100px; }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: var(--primary);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 188, 212, 0.3);
            filter: brightness(1.1);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #555;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 700;
            transition: var(--transition);
        }
        .back-link:hover { color: white; }
    </style>
</head>
<body>

    <canvas id="hero-canvas"></canvas>

    <div class="rec-card">
        <h2>REKRUTACJA</h2>
        <p class="subtitle">Dołącz do ekipy DuceMC.PL</p>

        <form id="rec-form">
            <div class="form-group">
                <label>Nick z Minecraft</label>
                <input type="text" placeholder="Np. TwójNick123" required>
            </div>

            <div class="form-group">
                <label>Wiek</label>
                <input type="number" placeholder="Ile masz lat?" required>
            </div>

            <div class="form-group">
                <label>Stanowisko</label>
                <select>
                    <option>Helper (Duels)</option>
                    <option>Budowniczy</option>
                    <option>Moderator Discord</option>
                </select>
            </div>

            <div class="form-group">
                <label>Dlaczego Ty?</label>
                <textarea placeholder="Opisz swoje doświadczenie..."></textarea>
            </div>

            <div class="form-group">
                <label>Ile czasu dziennie poświęcisz na serwer?</label>
                <input type="text" placeholder="Np. 3-4 godziny">
            </div>

            <button type="submit" class="submit-btn">WYŚLIJ ZGŁOSZENIE</button>
        </form>

        <a href="index.html" class="back-link">← WRÓĆ DO STRONY GŁÓWNEJ</a>
    </div>

    <script>
        // Gwiazdy w tle (uproszczone dla wydajności)
        const canvas = document.getElementById('hero-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            stars = [];
            for(let i=0; i<80; i++) stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*2});
        }
        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "rgba(0, 188, 212, 0.3)";
            stars.forEach(s => {
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
                ctx.fill();
            });
            requestAnimationFrame(draw);
        }
        window.addEventListener('resize', init);
        init(); draw();

        // Obsługa wysyłania (na razie pokazowy alert)
        document.getElementById('rec-form').addEventListener('submit', (e) => {
            e.preventDefault();
            alert("Twoje zgłoszenie zostało wysłane do administracji! Powodzenia.");
            window.location.href = "index.html";
        });
    </script>
</body>
</html>

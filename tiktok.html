<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DuceMC.PL | TikTok Feed</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --tt-pink: #ff0050;
            --tt-cyan: #00f2ea;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            background: #02060a;
            color: white;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at top right, rgba(255,0,80,0.1), transparent),
                              radial-gradient(circle at bottom left, rgba(0,242,234,0.1), transparent);
        }

        .container {
            width: 90%;
            max-width: 1200px;
            padding: 40px 0;
        }

        .header { text-align: center; margin-bottom: 40px; }
        
        /* Stylizowany napis TikTok */
        .header h1 { 
            font-size: 3.5rem; 
            font-weight: 900;
            margin-bottom: 10px;
            text-shadow: 2px 2px var(--tt-pink), -2px -2px var(--tt-cyan);
        }

        /* Sekcja Statystyk Live */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--glass);
            padding: 20px 40px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            min-width: 150px;
        }

        .stat-card b { font-size: 1.5rem; color: var(--tt-cyan); display: block; }
        .stat-card span { font-size: 0.7rem; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px; }

        /* Widget Profilu */
        .profile-embed {
            margin-bottom: 50px;
            display: flex;
            justify-content: center;
        }

        .tiktok-embed {
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 600px !important; /* TikTok narzuca swoje szerokości */
        }

        /* Grid z filmami */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(325px, 1fr));
            gap: 25px;
        }

        .video-card {
            background: var(--glass);
            border-radius: 25px;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.4s;
        }

        .video-card:hover { 
            transform: translateY(-10px); 
            border-color: var(--tt-pink);
            box-shadow: 0 15px 30px rgba(255, 0, 80, 0.2);
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 30px;
            color: white;
            text-decoration: none;
            font-weight: 800;
            font-size: 0.8rem;
            padding: 10px 20px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            transition: 0.3s;
        }
        .back-btn:hover { background: white; color: black; }

        @media (max-width: 600px) {
            .header h1 { font-size: 2.5rem; }
            .stats-bar { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="back-btn">← POWRÓT DO SERWERA</a>

        <div class="header">
            <h1>TIKTOK LIVE</h1>
            <p style="opacity: 0.7;">Śledź nasze najnowsze akcje z kanału <b>@ducemc.pl</b></p>
        </div>

        <div class="stats-bar">
            <div class="stat-card">
                <b>DUCEMC.PL</b>
                <span>Użytkownik</span>
            </div>
            <div class="stat-card">
                <b id="followers-count">OBSERWUJ</b>
                <span>Nasze konto</span>
            </div>
        </div>

        <div class="profile-embed">
            <blockquote class="tiktok-embed" cite="https://www.tiktok.com/@ducemc.pl" data-unique-id="ducemc.pl" data-embed-type="creator" style="max-width: 780px; min-width: 288px;" > 
                <section> <a target="_blank" href="https://www.tiktok.com/@ducemc.pl?refer=creator_embed">@ducemc.pl</a> </section> 
            </blockquote>
        </div>

        <div class="header">
            <h2 style="font-size: 1.5rem; letter-spacing: 5px;">OSTATNIE FILMY</h2>
        </div>

        <div class="video-grid">
            <div class="video-card">
                <blockquote class="tiktok-embed" cite="https://www.tiktok.com/@ducemc.pl" data-embed-type="video" style="max-width: 605px;min-width: 325px;"> 
                    <section></section> 
                </blockquote>
            </div>

            <div class="video-card">
                <blockquote class="tiktok-embed" cite="https://www.tiktok.com/@ducemc.pl" data-embed-type="video" style="max-width: 605px;min-width: 325px;"> 
                    <section></section> 
                </blockquote>
            </div>

            <div class="video-card">
                <blockquote class="tiktok-embed" cite="https://www.tiktok.com/@ducemc.pl" data-embed-type="video" style="max-width: 605px;min-width: 325px;"> 
                    <section></section> 
                </blockquote>
            </div>
        </div>
    </div>

    <script async src="https://www.tiktok.com/embed.js"></script>

</body>
</html>

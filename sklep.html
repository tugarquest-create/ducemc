<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DuceMC.PL | Doładuj Portfel</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff;
            --accent: #3a7bd5;
            --bg-dark: #03080f;
            --glass: rgba(10, 25, 47, 0.85);
            --border: rgba(0, 210, 255, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: default; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .bg-image {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('pobrane (1).jpg') center/cover no-repeat;
            filter: brightness(0.2) blur(5px);
            z-index: -2;
        }

        #bubbles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        .container {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 25px;
            width: 95%;
            max-width: 1100px;
            z-index: 10;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 25px;
            padding: 35px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h2 { font-weight: 900; font-size: 1.5rem; margin-bottom: 20px; color: var(--primary); text-transform: uppercase; }

        /* PORTFEL - GRID (Insp. CraftCube) */
        .wallet-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .wallet-option {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .wallet-option:hover, .wallet-option.active {
            border-color: var(--primary);
            background: rgba(0, 210, 255, 0.1);
            transform: translateY(-3px);
        }

        .coin-icon { font-size: 1.8rem; display: block; margin-bottom: 10px; filter: drop-shadow(0 0 10px gold); }
        .vpln-amount { font-weight: 900; font-size: 1.1rem; }

        /* CUSTOM PRICE SECTION */
        .custom-price-box {
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        input[type=range] {
            width: 100%;
            margin: 20px 0;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .price-display {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 800;
        }

        .btn-pay {
            width: 100%;
            margin-top: 25px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            color: white;
            padding: 18px;
            border-radius: 15px;
            border: none;
            font-weight: 900;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3);
            transition: 0.3s;
        }

        .btn-pay:hover { filter: brightness(1.1); transform: scale(1.02); }

        @media (max-width: 850px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="bg-image"></div>
    <canvas id="bubbles"></canvas>

    <div class="container">
        <div class="glass-card" style="text-align: center;">
            <div style="font-size: 0.7rem; color: var(--primary); font-weight: 800; margin-bottom: 10px;">ZALOGOWANY JAKO:</div>
            <img src="https://cravatar.eu/avatar/MHF_Steve/64.png" style="border-radius: 10px; margin-bottom: 15px; border: 2px solid var(--primary);">
            <h1 style="font-size: 1.8rem; font-weight: 900;">GRACZ</h1>
            <p style="opacity: 0.5; font-size: 0.8rem;">Twój balans: <b>0.00 vPLN</b></p>
            
            <hr style="margin: 30px 0; opacity: 0.1;">
            
            <a href="index.html" style="color: white; text-decoration: none; font-size: 0.8rem; font-weight: 700; opacity: 0.5;">← POWRÓT DO STRONY</a>
        </div>

        <div class="glass-card">
            <h2>Ile potrzebujesz doładować?</h2>
            
            <div class="wallet-grid">
                <div class="wallet-option" onclick="selectFixed(20, this)">
                    <span class="coin-icon">💰</span>
                    <span class="vpln-amount">20 vPLN</span>
                </div>
                <div class="wallet-option" onclick="selectFixed(30, this)">
                    <span class="coin-icon">💰</span>
                    <span class="vpln-amount">30 vPLN</span>
                </div>
                <div class="wallet-option active" onclick="selectFixed(40, this)">
                    <span class="coin-icon">💰</span>
                    <span class="vpln-amount">40 vPLN</span>
                </div>
            </div>

            <div class="custom-price-box">
                <div class="price-display">
                    <span>NIESTANDARDOWA KWOTA</span>
                    <span id="current-vpln" style="color: var(--primary); font-size: 1.2rem;">40 vPLN</span>
                </div>
                
                <input type="range" id="price-slider" min="20" max="999" value="40" oninput="updatePrice(this.value)">
                
                <div style="display: flex; justify-content: space-between; font-size: 0.7rem; opacity: 0.4; font-weight: 800;">
                    <span>MIN: 20 zł</span>
                    <span>MAX: 999 zł</span>
                </div>
            </div>

            <div style="margin-top: 30px; padding: 15px; border-top: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center;">
                <span style="font-weight: 600; opacity: 0.7;">Do zapłaty:</span>
                <span id="final-price" style="font-size: 1.5rem; font-weight: 900; color: #fff;">40.00 PLN</span>
            </div>

            <button class="btn-pay">Przejdź do płatności</button>
        </div>
    </div>

    <script>
        function updatePrice(val) {
            document.getElementById('current-vpln').innerText = val + " vPLN";
            document.getElementById('final-price').innerText = parseFloat(val).toFixed(2) + " PLN";
            
            // Odznacz pakiety jeśli używamy suwaka
            document.querySelectorAll('.wallet-option').forEach(el => el.classList.remove('active'));
        }

        function selectFixed(val, el) {
            // Zaznacz wybrany pakiet
            document.querySelectorAll('.wallet-option').forEach(item => item.classList.remove('active'));
            el.classList.add('active');
            
            // Zaktualizuj suwak i ceny
            document.getElementById('price-slider').value = val;
            updatePrice(val);
        }

        // --- BĄBELKI (Ten sam styl co na głównej) ---
        const canvas = document.getElementById('bubbles');
        const ctx = canvas.getContext('2d');
        let bubbles = [];
        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            bubbles = [];
            for(let i=0; i<30; i++) {
                bubbles.push({ x: Math.random()*canvas.width, y: canvas.height+50, r: Math.random()*2+1, v: Math.random()*1+0.5, o: Math.random()*0.2 });
            }
        }
        function animate() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            bubbles.forEach(b => {
                ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
                ctx.fillStyle = `rgba(0, 210, 255, ${b.o})`; ctx.fill();
                b.y -= b.v; if(b.y < -20) b.y = canvas.height+20;
            });
            requestAnimationFrame(animate);
        }
        window.addEventListener('resize', init);
        init(); animate();
    </script>
</body>
</html>

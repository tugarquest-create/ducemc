<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sklep | DuceMC.PL</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #1e90ff;
            --primary-glow: rgba(30, 144, 255, 0.5);
            --bg-dark: #020205;
            --card-bg: rgba(7, 7, 10, 0.94);
            --transition: all 0.3s ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-dark);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #hero-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }

        /* --- NAWIGACJA --- */
        nav {
            width: 100%;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(30, 144, 255, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-logo { font-weight: 900; color: var(--primary); text-decoration: none; font-size: 1.5rem; }

        .back-btn {
            text-decoration: none;
            color: white;
            font-weight: 700;
            font-size: 0.9rem;
            padding: 10px 20px;
            border: 1px solid var(--primary);
            border-radius: 10px;
            transition: var(--transition);
        }

        .back-btn:hover { background: var(--primary); box-shadow: 0 0 15px var(--primary-glow); }

        /* --- KONTENER SKLEPU --- */
        .shop-container {
            max-width: 1200px;
            width: 90%;
            margin: 50px 0;
            text-align: center;
        }

        h2 { font-size: 3rem; font-weight: 900; margin-bottom: 10px; text-shadow: 0 0 20px var(--primary-glow); }
        .subtitle { color: #888; margin-bottom: 40px; text-transform: uppercase; letter-spacing: 2px; }

        /* --- SIATKA PRZEDMIOTÓW --- */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .item-card {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 25px;
            padding: 30px;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .item-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .item-icon { font-size: 3rem; margin-bottom: 20px; display: block; }
        .item-name { font-size: 1.5rem; font-weight: 900; margin-bottom: 10px; }
        .item-price { color: var(--primary); font-size: 1.2rem; font-weight: 700; margin-bottom: 20px; }
        
        .buy-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: #ff9800;
            color: white;
            text-decoration: none;
            font-weight: 900;
            border-radius: 12px;
            transition: var(--transition);
        }

        .buy-btn:hover { filter: brightness(1.2); transform: scale(1.02); }

    </style>
</head>
<body>

    <canvas id="hero-canvas"></canvas>

    <nav>
        <a href="index.html" class="nav-logo">DuceMC.PL</a>
        <a href="index.html" class="back-btn">← POWRÓT</a>
    </nav>

    <div class="shop-container">
        <h2>SKLEP SERWEROWY</h2>
        <p class="subtitle">Wybierz pakiet i wesprzyj rozwój serwera</p>

        <div class="items-grid">
            <div class="item-card">
                <span class="item-icon">💎</span>
                <div class="item-name">Ranga VIP</div>
                <div class="item-price">14.99 PLN / 30 dni</div>
                <a href="#" class="buy-btn">KUP TERAZ</a>
            </div>

            <div class="item-card" style="border-color: var(--primary);">
                <span class="item-icon">👑</span>
                <div class="item-name">Ranga SVIP</div>
                <div class="item-price">29.99 PLN / 30 dni</div>
                <a href="#" class="buy-btn">KUP TERAZ</a>
            </div>

            <div class="item-card">
                <span class="item-icon">🔓</span>
                <div class="item-name">UnBan</div>
                <div class="item-price">10.00 PLN</div>
                <a href="#" class="buy-btn">KUP TERAZ</a>
            </div>
        </div>
    </div>

    <script>
        // Ten sam skrypt tła co na stronie głównej dla spójności
        const canvas = document.getElementById('hero-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = [];
            for(let i=0; i<180; i++) {
                stars.push({
                    x: Math.random() * canvas.width - canvas.width/2,
                    y: Math.random() * canvas.height - canvas.height/2,
                    z: Math.random() * canvas.width
                });
            }
        }

        function draw() {
            ctx.fillStyle = '#020205';
            ctx.fillRect(0,0,canvas.width, canvas.height);
            ctx.save(); 
            ctx.translate(canvas.width/2, canvas.height/2);
            for(let s of stars) {
                s.z -= 1.2;
                if(s.z <= 0) s.z = canvas.width;
                let px = s.x / (s.z / canvas.width);
                let py = s.y / (s.z / canvas.width);
                let size = (1 - s.z / canvas.width) * 1.8;
                ctx.beginPath(); 
                ctx.arc(px, py, size, 0, Math.PI*2);
                ctx.fillStyle = `rgba(30, 144, 255, ${0.8 - s.z/canvas.width})`;
                ctx.fill();
            }
            ctx.restore();
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', init);
        init(); draw();
    </script>
</body>
</html>

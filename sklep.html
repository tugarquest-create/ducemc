<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DuceMC.PL | Doładuj Portfel</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff;
            --accent: #3a7bd5;
            --bg-dark: #03080f;
            --glass: rgba(10, 25, 47, 0.95);
            --border: rgba(0, 210, 255, 0.2);
            --success: #00ff88;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; cursor: default; }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .bg-image {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(3, 8, 15, 0.9), rgba(3, 8, 15, 0.9)), url('pobrane (1).jpg') center/cover;
            z-index: -2;
        }

        .container {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 30px;
            width: 100%;
            max-width: 1100px;
            z-index: 10;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 35px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.7);
        }

        .nick-input {
            width: 100%; background: rgba(0,0,0,0.5); border: 2px solid var(--border);
            padding: 18px; border-radius: 20px; color: white;
            font-weight: 800; font-family: 'JetBrains Mono', monospace;
            text-align: center; font-size: 1.1rem; cursor: text;
        }

        .avatar-preview {
            width: 120px; height: 120px; border-radius: 20px;
            border: 3px solid var(--primary); background: #050a14;
            display: block; margin: 20px auto; padding: 5px;
        }

        .wallet-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .wallet-option {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px; border-radius: 15px; text-align: center; cursor: pointer;
        }
        .wallet-option.active { border-color: var(--primary); background: rgba(0, 210, 255, 0.1); }

        .btn-pay {
            width: 100%; background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white; padding: 20px; border-radius: 18px; border: none;
            font-weight: 900; font-size: 1.1rem; cursor: pointer; margin-top: 20px;
        }

        @media (max-width: 900px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="bg-image"></div>

    <div class="container">
        <div class="glass-card">
            <p style="font-size: 0.7rem; font-weight: 900; color: var(--primary); letter-spacing: 2px;">IDENTYFIKACJA</p>
            <input type="text" class="nick-input" id="player-nick" placeholder="NICK Z MC" oninput="updateAvatar(this.value)">
            <img id="avatar" src="https://cravatar.eu/avatar/MHF_Steve/128.png" class="avatar-preview">
            <h2 id="display-nick" style="text-align: center; font-weight: 900;">GRACZ</h2>
            <a href="index.html" style="display: block; text-align: center; margin-top: 30px; color: var(--primary); text-decoration: none; font-size: 0.8rem; font-weight: 800;">← POWRÓT</a>
        </div>

        <div class="glass-card">
            <h2 style="font-size: 2rem; font-weight: 900;">Doładuj Portfel</h2>
            <p style="opacity: 0.5; margin-bottom: 20px;">Środki zostaną dodane automatycznie po płatności.</p>
            
            <div class="wallet-grid">
                <div class="wallet-option" onclick="selectFixed(10, this)">10 PLN</div>
                <div class="wallet-option active" onclick="selectFixed(25, this)">25 PLN</div>
                <div class="wallet-option" onclick="selectFixed(50, this)">50 PLN</div>
            </div>

            <div style="background: rgba(0,0,0,0.3); padding: 20px; border-radius: 20px; margin-top: 20px;">
                <p style="font-size: 0.8rem; font-weight: 800; color: var(--primary);">PODSUMOWANIE</p>
                <p style="font-size: 2rem; font-weight: 900;"><span id="final-price">25.00</span> PLN</p>
            </div>

            <button class="btn-pay" onclick="processPayment()">ZAPŁAĆ TERAZ</button>
            <p style="text-align: center; font-size: 0.6rem; opacity: 0.3; margin-top: 15px;">Płatność obsługiwana przez IceHost.pl</p>
        </div>
    </div>

    <script>
        let currentAmount = 25;

        function updateAvatar(nick) {
            const avatar = document.getElementById('avatar');
            const displayNick = document.getElementById('display-nick');
            if(nick.length > 2) {
                avatar.src = `https://cravatar.eu/avatar/${nick}/128.png`;
                displayNick.innerText = nick.toUpperCase();
            }
        }

        function selectFixed(val, el) {
            document.querySelectorAll('.wallet-option').forEach(item => item.classList.remove('active'));
            el.classList.add('active');
            currentAmount = val;
            document.getElementById('final-price').innerText = val + ".00";
        }

        function processPayment() {
            const nick = document.getElementById('player-nick').value;
            
            if(nick.length < 3) {
                alert("❌ Najpierw wpisz swój nick z Minecraft!");
                return;
            }

            // DOKŁADNY LINK DO TWOJEGO SKLEPU
            const icehostLink = `https://dash.icehost.pl/t/nRcpQxBTdK?nick=${nick}&amount=${currentAmount}`;
            
            const btn = document.querySelector('.btn-pay');
            btn.innerText = "PRZEKIEROWYWANIE...";
            btn.style.opacity = "0.5";
            
            window.location.href = icehostLink;
        }
    </script>
</body>
</html>
